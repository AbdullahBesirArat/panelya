services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: panelya
      POSTGRES_USER: panelya_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panelya_local_pg_9f5b7c2d4a6e8f10}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panelya_user -d panelya"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./panelya-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://panelya_user:${POSTGRES_PASSWORD:-panelya_local_pg_9f5b7c2d4a6e8f10}@postgres:5432/panelya
      JWT_SECRET_APP: ${JWT_SECRET_APP:-panelya_app_dev_9f2d7a8c4b6e1f03a5c8d0e2f4b6a8c1d3e5f709b2c4d6e8f0a1b3c5d7e9f102}
      JWT_SECRET_ADMIN: ${JWT_SECRET_ADMIN:-panelya_admin_dev_6c1e9a4f2b8d0c7e5a3f1d9b6c4e2a807f5d3b1c9e6a4f2d0b8c7e5a3f1d9b6c}
      JWT_EXPIRES_IN: 2h
      CORS_ORIGIN: http://localhost:3001
      DEFAULT_ORGANIZATION_PLAN: growth
      API_RATE_LIMIT: 1200
      LOGIN_RATE_LIMIT: 10
      UPLOAD_RATE_LIMIT: 40
      DB_POOL_MAX: 40
      UPLOAD_DIR: /app/uploads
      PAYMENT_PROVIDER: mock
      PAYMENT_MOCK_AUTO_PAY: "false"
      PAYMENT_CALLBACK_SECRET_REQUIRED: "false"
      PUBLIC_SITE_URL: http://localhost:3001
      PUBLIC_API_URL: http://localhost:3000
      PAYMENT_CALLBACK_URL: http://localhost:3000/api/payment/callback
      DEFAULT_ORGANIZATION_SLUG: panelya
    ports:
      - "3000:3000"
    command: >
      sh -c "npm run db:schema &&
      npm run db:seed &&
      npm run db:migrate &&
      npm run demo:seed &&
      npm start"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/api
    ports:
      - "3001:3001"
    depends_on:
      - api

volumes:
  postgres_data:
  api_uploads:
