name: Panelya CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run check:api
      - run: npm run lint:web
      - run: npm run typecheck:web
      - run: npm run build:web

  payment-smoke:
    name: Payment smoke
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: maveran
          POSTGRES_USER: maveran_user
          POSTGRES_PASSWORD: maveran_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U maveran_user -d maveran"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://maveran_user:maveran_ci_password@localhost:5432/maveran
      JWT_SECRET: ci_payment_smoke_secret_64_chars_minimum_change_only_in_ci_2026
      JWT_EXPIRES_IN: 2h
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_DAYS: 30
      CORS_ORIGIN: http://localhost:3001
      API_RATE_LIMIT: 600
      LOGIN_RATE_LIMIT: 10
      REGISTER_RATE_LIMIT: 20
      ORDER_CREATE_RATE_LIMIT: 60
      PAYMENT_INIT_RATE_LIMIT: 40
      PAYMENT_PROVIDER: mock
      PAYMENT_MOCK_AUTO_PAY: "false"
      PAYMENT_CALLBACK_SECRET_REQUIRED: "true"
      PAYMENT_CALLBACK_SECRET: ci_payment_callback_secret_64_chars_minimum_value_2026
      PUBLIC_SITE_URL: http://localhost:3001
      PUBLIC_API_URL: http://localhost:3000
      PAYMENT_CALLBACK_URL: http://localhost:3000/api/payment/callback
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run db:setup
      - name: Start API
        run: npm run start:api > api.log 2>&1 &
      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/api/health; then
              exit 0
            fi
            sleep 1
          done
          cat api.log
          exit 1
      - run: npm run smoke:auth:bash
      - run: npm run smoke:payment:bash
